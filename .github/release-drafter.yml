---
name-template: "v$NEXT_PATCH_VERSION"
tag-template: "v$NEXT_PATCH_VERSION"
categories:
  - title: "New Features"
    labels: ["enhancement", "feature"]
  - title: "Bug Fixes"
    labels: ["bug", "fix"]
  - title: "Maintenance"
    labels: ["chore", "dependencies", "ci"]
autolabeler:
  - label: enhancement
    title:
      - '/^feat(\(.+\))?!?:/i'
  - label: fix
    title:
      - '/^(fix|perf|revert)(\(.+\))?!?:/i'
  - label: chore
    title:
      - '/^(chore|ci|docs|refactor|build|style|test)(\(.+\))?!?:/i'
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
