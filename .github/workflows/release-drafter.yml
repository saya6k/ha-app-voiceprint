---
name: Release Drafter

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  # Label PRs from their Conventional-Commit title so the version-resolver can
  # pick the bump (feat -> minor; fix/chore/ci -> patch). Without a PR trigger
  # the autolabeler never runs, so every release defaulted to patch. Uses
  # pull_request_target so labeling works for fork PRs too; release-drafter only
  # calls the API (no PR code is checked out).
  pull_request_target:
    types: [opened, reopened, synchronize, edited]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    name: Draft release
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
